name: 🐍 Python Standard CI (uv)

on:
  workflow_call:
    inputs:
      python-version:
        description: 'Python version'
        required: false
        default: '3.11'
        type: string
      has-docker:
        description: 'Build and push Docker image'
        required: false
        default: false
        type: boolean
      docker-registry:
        description: 'Docker registry'
        required: false
        default: 'ghcr.io'
        type: string
      nix-flake:
        description: 'Also validate Nix flake (macOS + Ubuntu)'
        required: false
        default: false
        type: boolean
    secrets:
      registry-token:
        description: 'Token for Docker registry login'
        required: false

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv python install ${{ inputs.python-version }}
      - run: |
          uv venv .venv --python ${{ inputs.python-version }}
          source .venv/bin/activate
          uv pip install -e ".[dev]"
      - run: |
          source .venv/bin/activate
          ruff check .
          ruff format --check .

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv python install ${{ inputs.python-version }}
      - run: |
          uv venv .venv --python ${{ inputs.python-version }}
          source .venv/bin/activate
          uv pip install -e ".[all,dev]"
      - run: |
          source .venv/bin/activate
          pytest tests/ -q --ignore=tests/integration --ignore=tests/e2e --tb=short -n auto
        env:
          OPENROUTER_API_KEY: ""
          OPENAI_API_KEY: ""

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv python install ${{ inputs.python-version }}
      - run: |
          uv venv .venv --python ${{ inputs.python-version }}
          source .venv/bin/activate
          uv pip install -e ".[all,dev]"
      - run: |
          source .venv/bin/activate
          pytest tests/e2e/ -v --tb=short
        env:
          OPENROUTER_API_KEY: ""
          OPENAI_API_KEY: ""

  nix:
    name: Nix Flake Validation
    if: inputs.nix-flake
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v13
      - run: nix flake check
      - run: nix build

  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: inputs.has-docker && github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ inputs.docker-registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.registry-token || secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ inputs.docker-registry }}/${{ github.repository }}:latest
            ${{ inputs.docker-registry }}/${{ github.repository }}:${{ github.sha }}
