name: 🚀 Node.js Standard CI

# USAGE: Copy this into `.github/workflows/ci.yml` in any Node repo.
# For pnpm repos, set package-manager: pnpm in the calling workflow.
# For npm repos, set package-manager: npm (default).

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version'
        required: false
        default: '20'
        type: string
      package-manager:
        description: 'npm or pnpm'
        required: false
        default: 'npm'
        type: string
      pnpm-version:
        description: 'pnpm version (if using pnpm)'
        required: false
        default: '9'
        type: string
      has-docker:
        description: 'Build and push Docker image'
        required: false
        default: false
        type: boolean
      docker-registry:
        description: 'Docker registry'
        required: false
        default: 'ghcr.io'
        type: string
    secrets:
      registry-token:
        description: 'Token for Docker registry login'
        required: false

env:
  NODE_VERSION: ${{ inputs.node-version }}
  REGISTRY: ${{ inputs.docker-registry }}
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        if: inputs.package-manager == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: ${{ inputs.pnpm-version }}
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: ${{ inputs.package-manager }}
      - run: ${{ inputs.package-manager }} install
      - run: ${{ inputs.package-manager }} run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        if: inputs.package-manager == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: ${{ inputs.pnpm-version }}
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: ${{ inputs.package-manager }}
      - run: ${{ inputs.package-manager }} install
      - run: ${{ inputs.package-manager }} run test -- --run 2>/dev/null || ${{ inputs.package-manager }} run test

  build:
    name: Build
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        if: inputs.package-manager == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: ${{ inputs.pnpm-version }}
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: ${{ inputs.package-manager }}
      - run: ${{ inputs.package-manager }} install
      - run: ${{ inputs.package-manager }} run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [build]
    if: inputs.has-docker && github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.registry-token || secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
